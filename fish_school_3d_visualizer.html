<!doctype html>
<html lang="en">
<head>
  <!-- CC BY-NC-SA 4.0 (Attribution-NonCommercial-ShareAlike) https://creativecommons.org/licenses/by-nc-sa/4.0/ -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fish School 3D Multiplex</title>
  <style>
    :root{--bg:#0b0d12;--fg:#e8eaed;--muted:#9aa0a6;--acc:#8ab4f8;--panel:#0f131d;--border:#1f2937;--danger:#ef5350;--success:#4caf50}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--fg);font:14px/1.4 "Inter",system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .app{display:grid;grid-template-columns:minmax(280px,360px) 1fr;grid-template-rows:auto 1fr;height:100%;min-height:0;transition:grid-template-columns .25s ease}
    .app>*{min-width:0;min-height:0}
    .app.collapsed{grid-template-columns:0 1fr}
    header{grid-column:1 / -1;padding:12px 16px;border-bottom:1px solid var(--border);background:#0f1113}
    header .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    header h1{font-size:18px;margin:0}
    header small{color:var(--muted)}
    main{grid-column:2 / -1;position:relative;background:#05070c;display:flex;align-items:stretch;justify-content:stretch}
    aside{background:var(--panel);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:16px;overflow:hidden;min-height:0;transition:padding .2s ease,border-color .2s ease,transform .25s ease;scrollbar-width:thin}
    aside h2{margin:0;font-size:15px;color:var(--fg)}
    .controls{flex:1;display:flex;flex-direction:column;gap:12px;overflow:auto;padding:0 4px 80px 0;scrollbar-gutter:stable;-webkit-overflow-scrolling:touch}
    .control{display:grid;grid-template-columns:minmax(0,1fr) minmax(120px,160px);gap:10px;align-items:center}
    .control label{font-size:12px;color:var(--muted)}
    .control span.value{color:var(--fg);font-variant-numeric:tabular-nums}
    .control input[type=range],.control select{width:100%;min-width:0}
    .control input[type=checkbox]{justify-self:end}
    button,.toggle{background:#1a2536;color:var(--fg);border:1px solid #233047;border-radius:10px;padding:8px 10px;font-size:13px;cursor:pointer;transition:background .2s ease,color .2s ease,border .2s ease}
    button:hover,.toggle:hover{background:#223149}
    button:disabled{opacity:.55;cursor:not-allowed}
    .toggle.active{background:var(--acc);color:#041024;border-color:#5d8df4}
    .btn-toggle{background:#10192a;color:var(--fg);border:1px solid #233047;border-radius:10px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s ease,border .2s ease,color .2s ease}
    .btn-toggle:hover{background:#17253b}
    .app.collapsed aside{pointer-events:none;opacity:0;transform:translateX(-12px);border-right-color:transparent}
    .app.collapsed main{grid-column:1 / -1}
    .app:not(.collapsed) aside{pointer-events:auto;opacity:1;transform:translateX(0)}
    .pill{padding:4px 8px;border-radius:999px;border:1px solid #233047;background:#0f1729;color:var(--muted);font-size:12px}
    .algo-note{margin:8px 4px 0;padding:12px 14px;border:1px solid rgba(143,160,181,.35);border-radius:12px;background:rgba(15,23,42,.55);color:var(--muted);font-size:12px;line-height:1.5}
    .control-group{display:flex;flex-direction:column;gap:10px;margin:2px 0 4px;padding:12px 14px;border:1px solid rgba(143,160,181,.35);border-radius:12px;background:rgba(15,23,42,.45)}
    .control-group h3{margin:0;font-size:12px;line-height:1.2;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .control-group .control{grid-template-columns:minmax(0,1fr) minmax(112px,150px)}
    .control[hidden]{display:none !important}
    .sim-grid{--cols:1;--rows:1;display:grid;grid-template-columns:repeat(var(--cols),minmax(0,1fr));grid-template-rows:repeat(var(--rows),minmax(0,1fr));gap:12px;padding:12px;box-sizing:border-box;width:100%;height:100%}
    .sim-grid.expanded{grid-template-columns:minmax(0,1fr) !important;grid-template-rows:minmax(0,1fr) !important;gap:0;padding:0}
    .sim-tile{position:relative;display:flex;flex-direction:column;min-height:0;border:1px solid var(--border);border-radius:14px;background:#05070c;overflow:hidden;box-shadow:0 10px 24px rgba(0,0,0,.35)}
    .sim-grid.expanded .sim-tile.sim-expanded{border:0;border-radius:0;box-shadow:none}
    .sim-grid.expanded .sim-tile.sim-hidden{display:none}
    .sim-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;background:rgba(10,15,24,.85);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
    .sim-header-main{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap}
    .sim-title{color:var(--fg);font-weight:600;letter-spacing:.02em;cursor:help;touch-action:manipulation;user-select:none}
    .sim-thread-status{padding:3px 7px;border-radius:999px;border:1px solid rgba(138,180,248,.45);background:#0b1322;color:#bcd3ff;font-size:11px;white-space:nowrap}
    .sim-actions{display:flex;align-items:center;gap:6px}
    .sim-action{width:26px;height:26px;border-radius:8px;padding:0;border:1px solid rgba(148,163,184,.32);background:#0f1729;color:var(--fg);font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
    .sim-action:hover{background:#17253b;border-color:rgba(148,163,184,.55)}
    .sim-add{border-color:rgba(138,180,248,.35);color:var(--acc)}
    .sim-remove{border-color:rgba(239,83,80,.35);background:rgba(60,20,20,.7);color:#ffd1d1}
    .sim-remove:hover{background:rgba(90,24,24,.85);border-color:#ef5350}
    .sim-expand{position:relative;font-size:0}
    .sim-expand::before,.sim-expand::after{position:absolute;font:15px/1 "Segoe UI Symbol","Apple Symbols",system-ui,sans-serif;color:currentColor}
    .sim-expand::before{content:"↖";left:4px;top:3px}
    .sim-expand::after{content:"↘";right:4px;bottom:3px}
    .sim-expand.restore::before{content:"↘"}
    .sim-expand.restore::after{content:"↖"}
    .sim-view{position:relative;flex:1;min-height:0;background:#08101c}
    .sim-canvas{width:100%;height:100%;display:block;background:#08101c;touch-action:none}
    .sim-stats{position:absolute;left:12px;bottom:12px;padding:8px 10px;background:rgba(0,0,0,.48);border-radius:8px;font:12px ui-monospace;color:#cbd5e1;white-space:pre;pointer-events:none}
    .sim-messages{position:absolute;right:12px;bottom:12px;padding:10px 14px;background:rgba(43,27,27,.85);color:#ffdcdc;border:1px solid #a55;border-radius:10px;font:12px ui-monospace;display:none;max-width:46ch}
    .order-panel{position:absolute;left:12px;top:12px;width:clamp(148px,calc(100% - 132px),236px);height:140px;padding:10px 12px;background:rgba(255,255,255,.9);border:1px solid rgba(16,24,39,.18);border-radius:4px;box-sizing:border-box;color:#111827;box-shadow:0 12px 28px rgba(0,0,0,.28);z-index:3;pointer-events:none}
    .order-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;font:11px ui-monospace,Menlo,Consolas,monospace;color:#111827}
    .order-state{font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .order-canvas{display:block;width:100%;height:78px;background:#fff;border-left:1px solid #111827;border-bottom:1px solid #111827}
    .order-readout{margin-top:5px;display:flex;justify-content:space-between;font:11px ui-monospace,Menlo,Consolas,monospace;color:#111827}
    .order-readout span{font-weight:700}
    .sim-dpad{position:absolute;right:16px;top:16px;display:grid;grid-template-columns:28px 28px 28px;grid-template-rows:28px 28px 28px;gap:6px;user-select:none;z-index:4}
    .sim-dpad button{width:28px;height:28px;border-radius:6px;border:1px solid #233047;background:#10192a;color:#e8eaed;cursor:pointer;padding:0}
    .sim-dpad button:hover{background:#17253b}
    .sim-tile.focused{border-color:rgba(138,180,248,.75);box-shadow:0 0 0 1px rgba(138,180,248,.28),0 10px 24px rgba(0,0,0,.35)}
    .sim-placeholder{border:1px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);background:rgba(5,7,12,.35);cursor:pointer;padding:12px;box-sizing:border-box}
    .sim-placeholder:hover{background:rgba(7,10,16,.55);border-color:rgba(148,163,184,.5)}
    .sim-placeholder-plus{font-size:72px;line-height:1;color:var(--acc);font-weight:700}
    .sim-placeholder-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    a{color:var(--acc)}
    @media (max-width:960px){
      .app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
      .app.collapsed{grid-template-columns:1fr;grid-template-rows:auto 0 1fr}
      aside{grid-column:1 / -1;max-height:min(420px,60vh)}
      .app.collapsed aside{max-height:0 !important;height:0 !important;padding:0 !important;border:0 !important;overflow:hidden}
      main{grid-column:1 / -1;min-height:55vh}
    }
    @media (max-width:640px){
      header h1{font-size:16px}
      .btn-toggle{width:34px;height:34px}
      .control{grid-template-columns:1fr}
      .control-group .control{grid-template-columns:1fr}
      .control input[type=checkbox]{justify-self:start}
      .sim-header{flex-wrap:wrap}
      .order-panel{width:178px}
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="row">
      <button id="togglePanel" class="btn-toggle" aria-label="Collapse controls" aria-expanded="true">&laquo;</button>
      <h1>Fish School 3D Multiplex</h1>
      <button id="playPause">Pause All</button>
      <button id="respawn">Reset All</button>
      <button id="addInstance">Add instance <span class="pill" id="instanceCount">(1 running)</span></button>
      <div class="toggle active" data-key="follow">Follow centroid</div>
      <div class="toggle active" data-key="floor">Floor</div>
      <div class="toggle" data-key="trails">Trails</div>
      <small>3D angular-nearest visual control, no hydrodynamics</small>
    </div>
  </header>
  <aside id="panel" tabindex="-1">
    <h2>Controls</h2>
    <div class="controls">
      <div class="control-group" aria-labelledby="initialConditionsHeading">
        <h3 id="initialConditionsHeading">Initial Conditions</h3>
        <div class="control">
          <label for="initMode">Initial condition</label>
          <select id="initMode">
            <option value="ball">3D ball</option>
            <option value="random">3D blob</option>
            <option value="line">Line formation</option>
          </select>
        </div>
        <div class="control" data-init-modes="ball random">
          <label for="horizontalSpread">Horizontal spread: <span class="value" id="horizontalSpreadVal">10.0</span></label>
          <input id="horizontalSpread" type="range" min="1" max="40" step="0.5" value="10">
        </div>
        <div class="control" data-init-modes="ball random">
          <label for="verticalSpread">Vertical spread: <span class="value" id="verticalSpreadVal">5.0</span></label>
          <input id="verticalSpread" type="range" min="0.5" max="25" step="0.5" value="5">
        </div>
        <div class="control" data-init-modes="line">
          <label for="lineLength">Line length: <span class="value" id="lineLengthVal">20.0</span></label>
          <input id="lineLength" type="range" min="1" max="80" step="0.5" value="20">
        </div>
        <div class="control" data-init-modes="line">
          <label for="lineTransverseSpread">Line transverse spread: <span class="value" id="lineTransverseSpreadVal">1.0</span></label>
          <input id="lineTransverseSpread" type="range" min="0" max="20" step="0.1" value="1">
        </div>
        <div class="control" data-init-modes="line">
          <label for="lineAxialSpread">Line axial spread: <span class="value" id="lineAxialSpreadVal">1.0</span></label>
          <input id="lineAxialSpread" type="range" min="0" max="20" step="0.1" value="1">
        </div>
        <div class="control" data-init-modes="line">
          <label for="lineVerticalSpread">Line vertical spread: <span class="value" id="lineVerticalSpreadVal">1.0</span></label>
          <input id="lineVerticalSpread" type="range" min="0" max="20" step="0.1" value="1">
        </div>
      </div>
      <div class="control">
        <label for="N">School size: <span class="value" id="NVal">150</span></label>
        <input id="N" type="range" min="10" max="2000" step="1" value="150">
      </div>
      <div class="control">
        <label for="Ia">Alignment by vision I<sub>a</sub>: <span class="value" id="IpVal">1.50</span></label>
        <input id="Ia" type="range" min="0.01" max="10" step="0.01" value="1.5">
      </div>
      <div class="control">
        <label for="In">Free-will noise I<sub>n</sub>: <span class="value" id="InVal">0.30</span></label>
        <input id="In" type="range" min="0" max="5" step="0.01" value="0.3">
      </div>
      <div class="control">
        <label for="speed">Cruise speed: <span class="value" id="speedVal">1.00</span></label>
        <input id="speed" type="range" min="0.05" max="3" step="0.01" value="1">
      </div>
      <div class="control">
        <label for="dt">Time step: <span class="value" id="dtVal">0.04</span></label>
        <input id="dt" type="range" min="0.005" max="0.12" step="0.005" value="0.04">
      </div>
      <div class="control">
        <label for="muBins">Axial visual bins: <span class="value" id="muBinsVal">5</span></label>
        <input id="muBins" type="range" min="1" max="16" step="1" value="5">
      </div>
      <div class="control">
        <label for="azimuthBins">Azimuth visual bins: <span class="value" id="azimuthBinsVal">8</span></label>
        <input id="azimuthBins" type="range" min="3" max="32" step="1" value="8">
      </div>
      <p class="algo-note">
        Each fish keeps the nearest visible neighbor in every body-axis angular bin. The current visual weight is max(0, 1 + dot(body axis, neighbor direction)).
      </p>
    </div>
  </aside>
  <main>
    <div id="simGrid" class="sim-grid" style="--cols:1;--rows:1;"></div>
    <template id="simTemplate">
      <section class="sim-tile">
        <div class="sim-header">
          <div class="sim-header-main">
            <span class="sim-title">Sim 1</span>
            <span class="sim-thread-status">Main 3D</span>
          </div>
          <div class="sim-actions">
            <button type="button" class="sim-action sim-duplicate" aria-label="Duplicate instance" title="Duplicate this instance">&#x29C9;</button>
            <button type="button" class="sim-action sim-reset" aria-label="Reset this instance" title="Reset this instance">&#x27F3;</button>
            <button type="button" class="sim-action sim-expand" aria-label="Expand this instance" aria-pressed="false" title="Expand this instance"></button>
            <button type="button" class="sim-action sim-add" aria-label="Add instance" title="Add a new instance">+</button>
            <button type="button" class="sim-action sim-remove" aria-label="Remove instance" title="Close this instance">x</button>
          </div>
        </div>
        <div class="sim-view">
          <canvas class="sim-canvas"></canvas>
          <div class="order-panel">
            <div class="order-head">
              <span>P and Π(t)</span>
              <span class="order-state">initializing</span>
            </div>
            <canvas class="order-canvas"></canvas>
            <div class="order-readout">
              <span>P 0.00</span>
              <span>Π 0.00</span>
            </div>
          </div>
          <div class="sim-stats"></div>
          <div class="sim-messages"></div>
          <div class="sim-dpad" title="Camera">
            <div></div>
            <button type="button" data-camera="up" aria-label="Orbit up">&uarr;</button>
            <div></div>
            <button type="button" data-camera="left" aria-label="Orbit left">&larr;</button>
            <button type="button" data-camera="reset" aria-label="Reset camera">&bull;</button>
            <button type="button" data-camera="right" aria-label="Orbit right">&rarr;</button>
            <div></div>
            <button type="button" data-camera="down" aria-label="Orbit down">&darr;</button>
            <div></div>
          </div>
        </div>
      </section>
    </template>
  </main>
</div>
<script type="module">
import * as THREE from './javascripts/vendor/three/0.160.0/three.module.js';
import {
  computeFrameMetrics3D,
  computeStep3D,
  createSimulationState3D,
  meanPoint3D,
} from './javascripts/fish_school_compute_core3d.js';

const appEl = document.getElementById('app');
const togglePanelBtn = document.getElementById('togglePanel');
const panelEl = document.getElementById('panel');
const simGrid = document.getElementById('simGrid');
const simTemplate = document.getElementById('simTemplate');
const addInstanceBtn = document.getElementById('addInstance');
const instanceCountEl = document.getElementById('instanceCount');
const playPauseBtn = document.getElementById('playPause');

const ORDER_HISTORY_LIMIT = 120 * 4;
const ORDER_SAMPLE_INTERVAL_MS = 250;
const ORDER_THRESHOLDS = {high:0.65, low:0.35, dominance:0.10};
const ORDER_STATES = {
  swarming:{label:'Swarming', color:'#83c95b'},
  schooling:{label:'Schooling', color:'#f03b2f'},
  milling:{label:'Milling', color:'#2d7fc1'},
  turning:{label:'Turning', color:'#a6a6a6'},
  transition:{label:'Transition', color:'#f0d264'},
};
const ORDER_P_COLOR = ORDER_STATES.schooling.color;
const ORDER_PI_COLOR = ORDER_STATES.milling.color;

const controls = {
  initMode: document.getElementById('initMode'),
  N: document.getElementById('N'),
  NVal: document.getElementById('NVal'),
  Ia: document.getElementById('Ia'),
  IpVal: document.getElementById('IpVal'),
  In: document.getElementById('In'),
  InVal: document.getElementById('InVal'),
  speed: document.getElementById('speed'),
  speedVal: document.getElementById('speedVal'),
  dt: document.getElementById('dt'),
  dtVal: document.getElementById('dtVal'),
  muBins: document.getElementById('muBins'),
  muBinsVal: document.getElementById('muBinsVal'),
  azimuthBins: document.getElementById('azimuthBins'),
  azimuthBinsVal: document.getElementById('azimuthBinsVal'),
  horizontalSpread: document.getElementById('horizontalSpread'),
  horizontalSpreadVal: document.getElementById('horizontalSpreadVal'),
  verticalSpread: document.getElementById('verticalSpread'),
  verticalSpreadVal: document.getElementById('verticalSpreadVal'),
  lineLength: document.getElementById('lineLength'),
  lineLengthVal: document.getElementById('lineLengthVal'),
  lineTransverseSpread: document.getElementById('lineTransverseSpread'),
  lineTransverseSpreadVal: document.getElementById('lineTransverseSpreadVal'),
  lineAxialSpread: document.getElementById('lineAxialSpread'),
  lineAxialSpreadVal: document.getElementById('lineAxialSpreadVal'),
  lineVerticalSpread: document.getElementById('lineVerticalSpread'),
  lineVerticalSpreadVal: document.getElementById('lineVerticalSpreadVal'),
  respawn: document.getElementById('respawn'),
};

const stateFlags = {follow:true, floor:true, trails:false};
const toggleButtons = new Map();
const sims = new Map();
let simCounter = 0;
let activeSimId = null;
let expandedSimId = null;
let isPlaying = true;
let lastAnimationMs = performance.now();

function clamp(value, lo, hi){
  return Math.max(lo, Math.min(hi, value));
}

function readNumber(input, fallback){
  const value = Number(input?.value);
  return Number.isFinite(value) ? value : fallback;
}

function classifyOrderState(metrics){
  const p = clamp(Number(metrics?.pol) || 0, 0, 1);
  const pi = clamp(Number(metrics?.pi) || 0, 0, 1);
  if(p >= ORDER_THRESHOLDS.high && p - pi >= ORDER_THRESHOLDS.dominance) return ORDER_STATES.schooling;
  if(pi >= ORDER_THRESHOLDS.high && pi - p >= ORDER_THRESHOLDS.dominance) return ORDER_STATES.milling;
  if(p < ORDER_THRESHOLDS.low && pi < ORDER_THRESHOLDS.low) return ORDER_STATES.swarming;
  if(p >= ORDER_THRESHOLDS.high && pi >= ORDER_THRESHOLDS.high) return ORDER_STATES.turning;
  if(p >= ORDER_THRESHOLDS.low && pi >= ORDER_THRESHOLDS.low) return ORDER_STATES.turning;
  return ORDER_STATES.transition;
}

function readInstanceParams(){
  return {
    n: clamp(Math.round(readNumber(controls.N, 150)), 10, 2000),
    Ia: clamp(readNumber(controls.Ia, 1.5), 0.01, 10),
    In: clamp(readNumber(controls.In, 0.3), 0, 5),
    horizontalSpread: clamp(readNumber(controls.horizontalSpread, 10), 1, 40),
    verticalSpread: clamp(readNumber(controls.verticalSpread, 5), 0.5, 25),
    lineLength: clamp(readNumber(controls.lineLength, 20), 1, 80),
    lineTransverseSpread: clamp(readNumber(controls.lineTransverseSpread, 1), 0, 20),
    lineAxialSpread: clamp(readNumber(controls.lineAxialSpread, 1), 0, 20),
    lineVerticalSpread: clamp(readNumber(controls.lineVerticalSpread, 1), 0, 20),
  };
}

function readStepParams(){
  return {
    dt: clamp(readNumber(controls.dt, 0.04), 0.005, 0.12),
    speed: clamp(readNumber(controls.speed, 1), 0.05, 3),
    muBins: clamp(Math.round(readNumber(controls.muBins, 5)), 1, 16),
    azimuthBins: clamp(Math.round(readNumber(controls.azimuthBins, 8)), 3, 32),
  };
}

function syncControlLabels(){
  controls.NVal.textContent = String(readInstanceParams().n);
  controls.IpVal.textContent = readNumber(controls.Ia, 1.5).toFixed(2);
  controls.InVal.textContent = readNumber(controls.In, 0.3).toFixed(2);
  controls.speedVal.textContent = readNumber(controls.speed, 1).toFixed(2);
  controls.dtVal.textContent = readNumber(controls.dt, 0.04).toFixed(3).replace(/0$/,'');
  controls.muBinsVal.textContent = String(Math.round(readNumber(controls.muBins, 5)));
  controls.azimuthBinsVal.textContent = String(Math.round(readNumber(controls.azimuthBins, 8)));
  controls.horizontalSpreadVal.textContent = readNumber(controls.horizontalSpread, 10).toFixed(1);
  controls.verticalSpreadVal.textContent = readNumber(controls.verticalSpread, 5).toFixed(1);
  controls.lineLengthVal.textContent = readNumber(controls.lineLength, 20).toFixed(1);
  controls.lineTransverseSpreadVal.textContent = readNumber(controls.lineTransverseSpread, 1).toFixed(1);
  controls.lineAxialSpreadVal.textContent = readNumber(controls.lineAxialSpread, 1).toFixed(1);
  controls.lineVerticalSpreadVal.textContent = readNumber(controls.lineVerticalSpread, 1).toFixed(1);
}

function syncInitialConditionVisibility(){
  const mode = controls.initMode?.value || 'ball';
  document.querySelectorAll('[data-init-modes]').forEach(row => {
    const modes = (row.dataset.initModes || '').split(/\s+/).filter(Boolean);
    const visible = modes.includes(mode);
    row.hidden = !visible;
    row.querySelectorAll('input, select, button').forEach(input => {
      input.disabled = !visible;
    });
  });
}

function syncInitialConditionUi(){
  syncControlLabels();
  syncInitialConditionVisibility();
}

function setPlaying(playing){
  isPlaying = !!playing;
  playPauseBtn.textContent = isPlaying ? 'Pause All' : 'Play All';
  sims.forEach(sim => sim.resetTimer());
}

function setCollapsed(collapsed){
  appEl.classList.toggle('collapsed', collapsed);
  togglePanelBtn.setAttribute('aria-expanded', String(!collapsed));
  togglePanelBtn.innerHTML = collapsed ? '&raquo;' : '&laquo;';
  togglePanelBtn.setAttribute('aria-label', collapsed ? 'Expand controls' : 'Collapse controls');
  requestAnimationFrame(() => sims.forEach(sim => sim.resize()));
}

const collapseQuery = window.matchMedia('(max-width: 960px)');
let userLockedPanel = false;
togglePanelBtn.addEventListener('click', () => {
  const collapsed = !appEl.classList.contains('collapsed');
  userLockedPanel = true;
  setCollapsed(collapsed);
  if(!collapsed && typeof panelEl.focus === 'function') panelEl.focus({preventScroll:true});
});
const handleCollapseChange = event => {

};
collapseQuery.addEventListener?.('change', handleCollapseChange);
collapseQuery.addListener?.(handleCollapseChange);
setCollapsed(collapseQuery.matches);

document.querySelectorAll('.toggle').forEach(btn => {
  const key = btn.dataset.key;
  toggleButtons.set(key, btn);
  stateFlags[key] = btn.classList.contains('active');
  btn.addEventListener('click', () => {

    stateFlags[key] = active;
    if(key === 'floor') sims.forEach(sim => sim.setFloorVisible(active));
    if(key === 'trails') sims.forEach(sim => sim.setTrailsVisible(active));
  });
});

function hotColor(t){
  let r=0,g=0,b=0;
  const third = 1/3;
  if(t <= 0){ r = g = b = 0; }
  else if(t < third){ r = 3*t; g = t; b = 0.5*t; }
  else if(t < 2*third){ r = 1; g = 3*t - 1; b = 0; }
  else if(t < 1){ r = 1; g = 1; b = 3*t - 2; }
  else { r = g = b = 1; }
  const floor = 0.38;
  return new THREE.Color(
    floor + (1 - floor) * r,
    floor + (1 - floor) * g,
    floor + (1 - floor) * b,
  );
}

function speedColor(speed){
  const t = clamp((speed * speed - 0.5) / 1.5, 0, 1);
  return hotColor(t);
}

function updateInstanceCount(){
  instanceCountEl.textContent = `(${sims.size} running)`;
}

function setActiveSimId(simId){
  activeSimId = simId;
  sims.forEach(sim => sim.node.classList.toggle('focused', sim.id === activeSimId));
}

function syncExpandedLayout(){
  if(expandedSimId !== null && !sims.has(expandedSimId)) expandedSimId = null;
  const expanded = expandedSimId !== null;
  simGrid.classList.toggle('expanded', expanded);
  sims.forEach(sim => {
    const isExpanded = expanded && sim.id === expandedSimId;
    const isHidden = expanded && sim.id !== expandedSimId;
    sim.node.classList.toggle('sim-expanded', isExpanded);
    sim.node.classList.toggle('sim-hidden', isHidden);
    sim.expandBtn.classList.toggle('restore', isExpanded);
    sim.expandBtn.setAttribute('aria-pressed', String(isExpanded));
  });
}

function setExpandedSimId(simId){
  expandedSimId = expandedSimId === simId ? null : simId;
  syncExpandedLayout();
  updateGridLayout();
  requestAnimationFrame(() => sims.forEach(sim => sim.resize()));
}

function updateGridLayout(){
  syncExpandedLayout();
  simGrid.querySelectorAll('.sim-placeholder').forEach(node => node.remove());
  if(expandedSimId !== null){
    simGrid.style.setProperty('--cols', '1');
    simGrid.style.setProperty('--rows', '1');
    return;
  }
  const count = sims.size;
  const tileCount = Math.max(1, count);
  const rect = simGrid.getBoundingClientRect();
  const gridW = Math.max(1, rect.width);
  const gridH = Math.max(1, rect.height);
  const targetAspect = 1.15;
  let bestCols = 1;
  let bestRows = tileCount;
  let bestScore = Infinity;
  for(let cols = 1; cols <= Math.min(tileCount, 16); cols++){
    const rows = Math.ceil(tileCount / cols);
    const aspect = (gridW / cols) / Math.max(1, gridH / rows);
    const empties = cols * rows - tileCount;
    const score = Math.abs(Math.log(aspect / targetAspect)) * 2.2 + empties * 0.06;
    if(score < bestScore){
      bestScore = score;
      bestCols = cols;
      bestRows = rows;
    }
  }
  simGrid.style.setProperty('--cols', String(bestCols));
  simGrid.style.setProperty('--rows', String(bestRows));
  const placeholders = bestCols * bestRows - count;
  for(let i = 0; i < placeholders; i++){
    const ph = document.createElement('button');
    ph.type = 'button';
    ph.className = 'sim-placeholder';
    ph.setAttribute('aria-label', 'Add instance');
    const plus = document.createElement('div');
    plus.className = 'sim-placeholder-plus';
    plus.textContent = '+';
    const label = document.createElement('div');
    label.className = 'sim-placeholder-label';
    label.textContent = 'Add instance';
    ph.append(plus, label);
    ph.addEventListener('click', () => addSimulation());
    simGrid.appendChild(ph);
  }
}

function createFishGeometry(){
  const body = new THREE.ConeGeometry(0.18, 0.86, 10, 1, false);
  body.rotateZ(-Math.PI / 2);
  body.translate(0.18, 0, 0);
  return body;
}

function createTrailGeometry(maxFish, trailLength){
  const positions = new Float32Array(maxFish * Math.max(0, trailLength - 1) * 2 * 3);
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setDrawRange(0, 0);
  return geometry;
}

class School3DSim {
  constructor(instanceParams = readInstanceParams()){
    this.id = ++simCounter;
    this.instanceParams = {...instanceParams};
    this.initMode = controls.initMode.value;
    this.node = simTemplate.content.firstElementChild.cloneNode(true);
    this.titleEl = this.node.querySelector('.sim-title');
    this.canvas = this.node.querySelector('.sim-canvas');
    this.statsEl = this.node.querySelector('.sim-stats');
    this.messageEl = this.node.querySelector('.sim-messages');
    this.orderCanvas = this.node.querySelector('.order-canvas');
    this.orderStateEl = this.node.querySelector('.order-state');
    this.orderReadoutEl = this.node.querySelector('.order-readout');
    this.expandBtn = this.node.querySelector('.sim-expand');
    this.orderHistory = [];
    this.nextOrderSampleMs = performance.now();
    this.frameCount = 0;
    this.lastStepMs = performance.now();
    this.trailLength = 28;
    this.trailCursor = 0;
    this.trailPositions = [];
    this.colorScratch = new THREE.Color();
    this.dummy = new THREE.Object3D();
    this.xAxis = new THREE.Vector3(1, 0, 0);
    this.direction = new THREE.Vector3(1, 0, 0);
    this.quaternion = new THREE.Quaternion();
    this.target = new THREE.Vector3(0, 0, 0);
    this.yaw = Math.PI * 0.75;
    this.pitch = 0.42;
    this.distance = 18;
    this.isDragging = false;
    this.dragMode = 'orbit';
    this.lastPointer = {x:0, y:0};

    this.setupScene();
    this.resetSchool();
    this.bindEvents();
    this.updateTitle();
    this.setFloorVisible(stateFlags.floor);
    this.setTrailsVisible(stateFlags.trails);
  }

  setupScene(){
    this.renderer = new THREE.WebGLRenderer({canvas:this.canvas, antialias:true, alpha:false});
    this.renderer.setClearColor(0x08101c, 1);
    this.renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x08101c, 0.004);
    this.camera = new THREE.PerspectiveCamera(48, 1, 0.05, 1000);
    this.scene.add(new THREE.HemisphereLight(0xbcd3ff, 0x1c2738, 1.6));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(8, 16, 10);
    this.scene.add(key);
    this.floor = new THREE.GridHelper(64, 32, 0x4b79a8, 0x223a58);
    this.floor.material.transparent = true;
    this.floor.material.opacity = 0.72;
    this.scene.add(this.floor);
    this.axes = new THREE.AxesHelper(2.5);
    this.axes.position.set(-2.2, 0.02, -2.2);
    this.scene.add(this.axes);
    this.fishMaterial = new THREE.MeshBasicMaterial({
      color:0xffd166,
      side:THREE.DoubleSide,
      toneMapped:false,
    });
    this.trailMaterial = new THREE.LineBasicMaterial({
      color:0x8ab4f8,
      transparent:true,
      opacity:0.28,
      depthWrite:false,
    });
  }

  bindEvents(){
    this.node.querySelector('.sim-duplicate').addEventListener('click', event => {
      event.stopPropagation();
      addSimulation({...this.instanceParams});
    });
    this.node.querySelector('.sim-reset').addEventListener('click', event => {
      event.stopPropagation();
      this.resetSchool();
    });
    this.expandBtn.addEventListener('click', event => {
      event.stopPropagation();
      setExpandedSimId(this.id);
    });
    this.node.querySelector('.sim-add').addEventListener('click', event => {
      event.stopPropagation();
      addSimulation();
    });
    this.node.querySelector('.sim-remove').addEventListener('click', event => {
      event.stopPropagation();
      removeSimulation(this.id);
    });
    this.node.addEventListener('pointerdown', () => setActiveSimId(this.id));
    this.canvas.addEventListener('pointerdown', event => this.onPointerDown(event));
    this.canvas.addEventListener('pointermove', event => this.onPointerMove(event));
    this.canvas.addEventListener('pointerup', event => this.onPointerUp(event));
    this.canvas.addEventListener('pointercancel', event => this.onPointerUp(event));
    this.canvas.addEventListener('wheel', event => this.onWheel(event), {passive:false});
    this.node.querySelectorAll('[data-camera]').forEach(btn => {
      btn.addEventListener('click', event => {
        event.preventDefault();
        this.nudgeCamera(btn.dataset.camera);
      });
    });
  }

  showMessage(message){
    if(!message){
      this.messageEl.style.display = 'none';
      this.messageEl.textContent = '';
      return;
    }
    this.messageEl.textContent = message;
    this.messageEl.style.display = 'block';
  }

  updateTitle(){
    const bins = readStepParams();
    this.titleEl.textContent = `Sim ${this.id}`;
    this.titleEl.title = `${this.instanceParams.n} fish, ${bins.muBins} x ${bins.azimuthBins} angular bins`;
  }

  resetTimer(){
    this.lastStepMs = performance.now();
  }

  resetSchool(){
    this.instanceParams = {...this.instanceParams, ...readInstanceParams()};
    this.initMode = controls.initMode.value;
    this.state = createSimulationState3D(this.instanceParams, this.initMode);
    this.rebuildFishMesh();
    this.resetTrails();
    const center = meanPoint3D(this.state);
    this.target.set(center.x, center.z, center.y);
    this.orderHistory.length = 0;
    this.nextOrderSampleMs = performance.now();
    this.frameCount = 0;
    this.resetTimer();
    this.updateTitle();
    this.resize();
  }

  rebuildFishMesh(){
    if(this.fishMesh){
      this.scene.remove(this.fishMesh);
      this.fishMesh.geometry.dispose();
    }
    const geometry = createFishGeometry();
    this.fishMesh = new THREE.InstancedMesh(geometry, this.fishMaterial, this.state.n);
    this.fishMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.scene.add(this.fishMesh);
    if(this.trailLines){
      this.scene.remove(this.trailLines);
      this.trailLines.geometry.dispose();
    }
    this.trailGeometry = createTrailGeometry(this.state.n, this.trailLength);
    this.trailLines = new THREE.LineSegments(this.trailGeometry, this.trailMaterial);
    this.trailLines.frustumCulled = false;
    this.scene.add(this.trailLines);
    this.setTrailsVisible(stateFlags.trails);
  }

  resetTrails(){
    this.trailCursor = 0;
    this.trailPositions = Array.from({length:this.trailLength}, () => new Float32Array(this.state.n * 3));
    this.writeTrailSample();
    this.updateTrailGeometry();
  }

  writeTrailSample(){
    if(!this.trailPositions.length) return;
    const sample = this.trailPositions[this.trailCursor];
    for(let i = 0; i < this.state.n; i++){
      const k = i * 3;
      sample[k] = this.state.x[i];
      sample[k + 1] = this.state.z[i];
      sample[k + 2] = this.state.y[i];
    }
    this.trailCursor = (this.trailCursor + 1) % this.trailLength;
  }

  updateTrailGeometry(){
    if(!this.trailGeometry || !this.trailPositions.length) return;
    const positions = this.trailGeometry.getAttribute('position').array;
    let ptr = 0;
    for(let i = 0; i < this.state.n; i++){
      for(let s = 0; s < this.trailLength - 1; s++){
        const aIndex = (this.trailCursor + s) % this.trailLength;
        const bIndex = (this.trailCursor + s + 1) % this.trailLength;
        const a = this.trailPositions[aIndex];
        const b = this.trailPositions[bIndex];
        const k = i * 3;
        positions[ptr++] = a[k];
        positions[ptr++] = a[k + 1];
        positions[ptr++] = a[k + 2];
        positions[ptr++] = b[k];
        positions[ptr++] = b[k + 1];
        positions[ptr++] = b[k + 2];
      }
    }
    this.trailGeometry.setDrawRange(0, ptr / 3);
    this.trailGeometry.getAttribute('position').needsUpdate = true;
  }

  setFloorVisible(visible){
    if(this.floor) this.floor.visible = !!visible;
    if(this.axes) this.axes.visible = !!visible;
  }

  setTrailsVisible(visible){
    if(this.trailLines) this.trailLines.visible = !!visible;
  }

  onPointerDown(event){
    this.isDragging = true;
    this.dragMode = event.button === 1 || event.button === 2 || event.shiftKey ? 'pan' : 'orbit';
    this.lastPointer.x = event.clientX;
    this.lastPointer.y = event.clientY;
    try { this.canvas.setPointerCapture(event.pointerId); } catch {}
  }

  onPointerMove(event){
    if(!this.isDragging) return;
    const dx = event.clientX - this.lastPointer.x;
    const dy = event.clientY - this.lastPointer.y;
    this.lastPointer.x = event.clientX;
    this.lastPointer.y = event.clientY;
    if(this.dragMode === 'pan'){
      this.panCamera(dx, dy);
    } else {
      this.yaw -= dx * 0.006;
      this.pitch = clamp(this.pitch - dy * 0.006, -1.35, 1.35);
    }
  }

  onPointerUp(event){
    this.isDragging = false;
    try { this.canvas.releasePointerCapture(event.pointerId); } catch {}
  }

  onWheel(event){
    event.preventDefault();
    const scale = Math.exp(event.deltaY * 0.001);
    this.distance = clamp(this.distance * scale, 3, 180);
  }

  panCamera(dx, dy){
    const forward = new THREE.Vector3();
    this.camera.getWorldDirection(forward);
    const right = new THREE.Vector3().crossVectors(forward, this.camera.up).normalize();
    const up = new THREE.Vector3().crossVectors(right, forward).normalize();
    const scale = this.distance * 0.0017;
    this.target.addScaledVector(right, -dx * scale);
    this.target.addScaledVector(up, dy * scale);
  }

  nudgeCamera(kind){
    if(kind === 'left') this.yaw += 0.18;
    else if(kind === 'right') this.yaw -= 0.18;
    else if(kind === 'up') this.pitch = clamp(this.pitch + 0.14, -1.35, 1.35);
    else if(kind === 'down') this.pitch = clamp(this.pitch - 0.14, -1.35, 1.35);
    else if(kind === 'reset'){
      const center = meanPoint3D(this.state);
      this.target.set(center.x, center.z, center.y);
      this.yaw = Math.PI * 0.75;
      this.pitch = 0.42;
      this.distance = Math.max(10, Math.cbrt(this.state.n) * 3.3);
    }
  }

  syncCamera(){
    const cp = Math.cos(this.pitch);
    const offset = new THREE.Vector3(
      Math.sin(this.yaw) * cp * this.distance,
      Math.sin(this.pitch) * this.distance,
      Math.cos(this.yaw) * cp * this.distance,
    );
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }

  resize(){
    const rect = this.canvas.getBoundingClientRect();
    const w = Math.max(1, Math.floor(rect.width * (window.devicePixelRatio || 1)));
    const h = Math.max(1, Math.floor(rect.height * (window.devicePixelRatio || 1)));
    if(this.canvas.width !== w || this.canvas.height !== h){
      this.renderer.setSize(rect.width, rect.height, false);
      this.camera.aspect = rect.width / Math.max(1, rect.height);
      this.camera.updateProjectionMatrix();
    }
    this.resizeOrderCanvas();
  }

  resizeOrderCanvas(){
    const rect = this.orderCanvas.getBoundingClientRect();
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const w = Math.max(1, Math.floor(rect.width * dpr));
    const h = Math.max(1, Math.floor(rect.height * dpr));
    if(this.orderCanvas.width !== w || this.orderCanvas.height !== h){
      this.orderCanvas.width = w;
      this.orderCanvas.height = h;
    }
  }

  step(nowMs, advance){
    if(advance){
      const stepParams = readStepParams();
      const instanceParams = {
        Ia: clamp(readNumber(controls.Ia, this.instanceParams.Ia), 0.01, 10),
        In: clamp(readNumber(controls.In, this.instanceParams.In), 0, 5),
      };
      computeStep3D(this.state, {instanceParams, params:stepParams});
      this.frameCount++;
      if(stateFlags.trails && this.frameCount % 3 === 0){
        this.writeTrailSample();
        this.updateTrailGeometry();
      }
    }

    if(nowMs >= this.nextOrderSampleMs){
      this.sampleOrder(nowMs);
      this.nextOrderSampleMs = nowMs + ORDER_SAMPLE_INTERVAL_MS;
    }
    this.updateFishInstances();
    this.updateStats();
    this.render();
  }

  sampleOrder(nowMs){
    const metrics = computeFrameMetrics3D(this.state);
    const t = nowMs / 1000;
    this.orderHistory.push({t, pol:metrics.pol, pi:metrics.pi});
    if(this.orderHistory.length > ORDER_HISTORY_LIMIT) this.orderHistory.shift();
    this.drawOrderPanel(metrics);
  }

  drawOrderPanel(metrics){
    this.resizeOrderCanvas();
    const ctx = this.orderCanvas.getContext('2d');
    const w = this.orderCanvas.width;
    const h = this.orderCanvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#d1d5db';
    ctx.lineWidth = 1;
    for(let i = 1; i < 4; i++){
      const y = h * i / 4;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    const drawSeries = (key, color) => {
      if(this.orderHistory.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1.5, window.devicePixelRatio || 1);
      ctx.beginPath();
      for(let i = 0; i < this.orderHistory.length; i++){
        const x = i / Math.max(1, this.orderHistory.length - 1) * w;
        const y = h - clamp(this.orderHistory[i][key], 0, 1) * h;
        if(i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    };
    drawSeries('pol', ORDER_P_COLOR);
    drawSeries('pi', ORDER_PI_COLOR);
    const state = classifyOrderState(metrics);
    this.orderStateEl.textContent = state.label;
    this.orderStateEl.style.color = state.color;
    this.orderReadoutEl.innerHTML = `<span>P ${metrics.pol.toFixed(2)}</span><span>Π ${metrics.pi.toFixed(2)}</span>`;
  }

  updateFishInstances(){
    const n = this.state.n;
    const stepParams = readStepParams();
    for(let i = 0; i < n; i++){
      this.direction.set(this.state.px[i], this.state.pz[i], this.state.py[i]).normalize();
      this.quaternion.setFromUnitVectors(this.xAxis, this.direction);
      const speed = Math.hypot(this.state.vx[i], this.state.vy[i], this.state.vz[i]);
      const scale = 1.35 + 0.25 * clamp(speed / Math.max(0.001, stepParams.speed), 0, 2);
      this.dummy.position.set(this.state.x[i], this.state.z[i], this.state.y[i]);
      this.dummy.quaternion.copy(this.quaternion);
      this.dummy.scale.setScalar(scale);
      this.dummy.updateMatrix();
      this.fishMesh.setMatrixAt(i, this.dummy.matrix);
    }
    this.fishMesh.instanceMatrix.needsUpdate = true;
  }

  updateStats(){
    const metrics = computeFrameMetrics3D(this.state);
    const stepParams = readStepParams();
    const center = meanPoint3D(this.state);
    this.statsEl.textContent =
      `N=${this.state.n}  bins=${stepParams.muBins}x${stepParams.azimuthBins}\n` +
      `P=${metrics.pol.toFixed(3)}  Π=${metrics.pi.toFixed(3)}\n` +
      `center=(${center.x.toFixed(1)}, ${center.y.toFixed(1)}, ${center.z.toFixed(1)})\n` +
      `dt=${stepParams.dt.toFixed(3)}  speed=${stepParams.speed.toFixed(2)}`;
  }

  render(){
    if(stateFlags.follow && !this.isDragging){
      const center = meanPoint3D(this.state);
      this.target.lerp(new THREE.Vector3(center.x, center.z, center.y), 0.08);
    }
    this.syncCamera();
    this.renderer.render(this.scene, this.camera);
  }

  readCanvasPixelStats(){
    this.resize();
    this.updateFishInstances();
    this.render();
    const gl = this.renderer.getContext();
    const w = this.canvas.width;
    const h = this.canvas.height;
    const pixels = new Uint8Array(w * h * 4);
    gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
    let nonBackground = 0;
    let bright = 0;
    for(let i = 0; i < pixels.length; i += 4){
      const r = pixels[i];
      const g = pixels[i + 1];
      const b = pixels[i + 2];
      if(Math.abs(r - 8) + Math.abs(g - 16) + Math.abs(b - 28) > 24) nonBackground++;
      if(r + g + b > 150) bright++;
    }
    return {width:w, height:h, nonBackground, bright};
  }

  dispose(){
    this.renderer.dispose();
    this.fishMesh?.geometry.dispose();
    this.trailGeometry?.dispose();
    this.fishMaterial?.dispose();
    this.trailMaterial?.dispose();
    this.node.remove();
  }
}

function addSimulation(instanceParams = readInstanceParams()){
  const sim = new School3DSim(instanceParams);
  sims.set(sim.id, sim);
  simGrid.appendChild(sim.node);
  setActiveSimId(sim.id);
  updateInstanceCount();
  updateGridLayout();
  requestAnimationFrame(() => sim.resize());
  return sim;
}

function removeSimulation(simId){
  if(sims.size <= 1) return;
  const sim = sims.get(simId);
  if(!sim) return;
  sims.delete(simId);
  sim.dispose();
  if(activeSimId === simId) setActiveSimId(sims.keys().next().value);
  if(expandedSimId === simId) expandedSimId = null;
  updateInstanceCount();
  updateGridLayout();
}

function resetAllSchools(){
  sims.forEach(sim => sim.resetSchool());
}

function animationLoop(nowMs){
  const elapsed = Math.min(250, nowMs - lastAnimationMs);
  lastAnimationMs = nowMs;
  const visibleAdvance = isPlaying && elapsed >= 0;
  sims.forEach(sim => {
    const hidden = expandedSimId !== null && sim.id !== expandedSimId;
    if(!hidden) sim.step(nowMs, visibleAdvance);
  });
  requestAnimationFrame(animationLoop);
}

function runSelfTest(){
  setTimeout(() => {
    const results = Array.from(sims.values()).map(sim => {
      const stats = sim.readCanvasPixelStats();
      return {
        simId: sim.id,
        ...stats,
        ok: stats.nonBackground > stats.width * stats.height * 0.01 && stats.bright > 20,
      };
    });
    const ok = results.length > 0 && results.every(result => result.ok);
    const pre = document.createElement('pre');
    pre.id = 'selftest';
    pre.textContent = JSON.stringify({status: ok ? 'ok' : 'fail', results});
    document.body.dataset.selftestStatus = ok ? 'ok' : 'fail';
    document.body.appendChild(pre);
  }, 1200);
}

function syncAfterControlEdit(){
  syncInitialConditionUi();
  sims.forEach(sim => sim.updateTitle());
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => {
    syncAfterControlEdit();
  });
  el.addEventListener('change', () => {
    syncAfterControlEdit();
  });
});
controls.respawn.addEventListener('click', resetAllSchools);
addInstanceBtn.addEventListener('click', () => addSimulation());
playPauseBtn.addEventListener('click', () => setPlaying(!isPlaying));
window.addEventListener('resize', () => {
  updateGridLayout();
  sims.forEach(sim => sim.resize());
});
window.addEventListener('keydown', event => {
  if(event.code === 'Space' && !/^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement?.tagName || '')){
    event.preventDefault();
    setPlaying(!isPlaying);
    return;
  }
  const sim = sims.get(activeSimId);
  if(!sim) return;
  if(event.key === 'ArrowLeft') sim.nudgeCamera('left');
  else if(event.key === 'ArrowRight') sim.nudgeCamera('right');
  else if(event.key === 'ArrowUp') sim.nudgeCamera('up');
  else if(event.key === 'ArrowDown') sim.nudgeCamera('down');
});

syncInitialConditionUi();
addSimulation();
requestAnimationFrame(animationLoop);
if(new URLSearchParams(window.location.search).has('selftest')) runSelfTest();
</script>
</body>
</html>
